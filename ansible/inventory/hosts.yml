---
# Edit once the ISE VM is up and switches are reachable.
all:
  children:
    ise:
      hosts:
        ise-pan:
          ansible_host: 192.0.2.10       # <-- change me
          ansible_connection: local      # cisco.ise modules talk HTTPS from localhost
    switches:
      hosts:
        sw-lab-01:
          ansible_host: 192.0.2.20       # <-- change me
        # sw-lab-02:
        #   ansible_host: 192.0.2.21
      vars:
        ansible_network_os: cisco.ios.ios
        ansible_connection: network_cli
        ansible_user: "{{ switch_username }}"
        ansible_password: "{{ switch_password }}"
        ansible_become: true
        ansible_become_method: enable
        ansible_become_password: "{{ switch_enable }}"
