---
# Cisco dCloud — ISE 3.4 Sandbox topology
# Accessed via AnyConnect VPN to the pod.
all:
  children:

    ise:
      hosts:
        ise-pan:
          ansible_host: 198.18.133.27
          ansible_connection: local        # cisco.ise modules talk HTTPS from localhost
          ise_version: "3.4.1"

    # Wireless LAN Controllers — primary NAD in the dCloud sandbox
    wlc:
      hosts:
        vwlc-01:
          ansible_host: 198.19.11.10
      vars:
        ansible_network_os: cisco.ios.ios   # C9800 vWLC runs IOS-XE
        ansible_connection: network_cli
        ansible_user: "{{ wlc_username }}"        # from vault/secrets.yml
        ansible_password: "{{ wlc_password }}"
        ansible_become: true
        ansible_become_method: enable
        # IOS-XE 17.09 still uses some legacy SSH algos
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -o HostKeyAlgorithms=+ssh-rsa
          -o KexAlgorithms=+diffie-hellman-group14-sha1

    # Wired switches — empty in the stock pod ("Bring Your Own switch").
    # Leave the group defined so playbooks still load; add hosts if you wire one in.
    switches:
      hosts: {}
      vars:
        ansible_network_os: cisco.ios.ios
        ansible_connection: network_cli
        ansible_user: "{{ switch_username }}"
        ansible_password: "{{ switch_password }}"
        ansible_become: true
        ansible_become_method: enable
        ansible_become_password: "{{ switch_enable }}"

    # Domain controller / external identity source
    ad:
      hosts:
        ad-01:
          ansible_host: 198.18.133.1
          ansible_connection: local
      vars:
        ad_domain: dcloud.cisco.com
        ad_netbios: dcloud
        ad_bind_user: administrator
        # ad_bind_password lives in vault/secrets.yml

    # Test endpoints / supplicants (config managed manually for now)
    endpoints:
      hosts:
        win-workstation:
          ansible_host: 198.18.133.36
          os: windows-10
          role: jumphost
        ubuntu-server:
          ansible_host: 198.18.133.100
          ansible_user: "{{ ubuntu_username | default('admin') }}"   # from vault/secrets.yml
          ansible_password: "{{ ubuntu_password }}"
          ansible_become: true
          ansible_become_password: "{{ ubuntu_password }}"
          os: ubuntu-22.04
          role: supplicant-test
