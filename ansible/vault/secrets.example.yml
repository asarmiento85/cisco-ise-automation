---
# Copy to secrets.yml, fill in real values, then encrypt:
#   cp ansible/vault/secrets.example.yml ansible/vault/secrets.yml
#   # edit secrets.yml
#   ansible-vault encrypt ansible/vault/secrets.yml
#
# secrets.yml is gitignored; this template is the committed reference.

# --- ISE PAN ---
ise_hostname: ise.lab.local
ise_username: ersadmin
ise_password: CHANGE_ME

# --- vWLC (C9800-CL) ---
wlc_username: admin
wlc_password: CHANGE_ME

# --- Wired switches (BYO) ---
switch_username: admin
switch_password: CHANGE_ME
switch_enable: CHANGE_ME

# --- Ubuntu test host (for radclient smoke tests) ---
ubuntu_username: admin
ubuntu_password: CHANGE_ME

# --- Active Directory ---
ad_bind_user: administrator
ad_bind_password: CHANGE_ME
ad_domain: example.local
ad_netbios: example

# --- RADIUS shared secret between NADs and ISE ---
# Pick something long & random; same value goes on every NAD.
radius_shared_secret: CHANGE_ME_LONG_RANDOM_STRING
