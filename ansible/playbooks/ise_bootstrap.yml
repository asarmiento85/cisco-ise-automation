---
# Bootstrap an ISE PAN after manual install:
#   - Verify ERS reachable
#   - Create baseline Network Device Groups (Location, Device Type)
#   - Seed an internal identity group for lab testing

- name: ISE — bootstrap baseline objects
  hosts: ise
  gather_facts: false
  vars_files:
    - ../vault/secrets.yml
  vars:
    ise_login: &ise_login
      ise_hostname: "{{ ise_hostname }}"
      ise_username: "{{ ise_username }}"
      ise_password: "{{ ise_password }}"
      ise_verify: false
      ise_wait_on_rate_limit: true
  tasks:

    - name: Reach ISE ERS (sanity check)
      ansible.builtin.uri:
        url: "https://{{ ise_hostname }}/ers/config/networkdevice?size=1"
        user: "{{ ise_username }}"
        password: "{{ ise_password }}"
        force_basic_auth: true
        validate_certs: false
        headers:
          Accept: application/json
        status_code: [200, 401]
      register: ers_check

    - name: Fail loudly if ERS not reachable / creds bad
      ansible.builtin.fail:
        msg: "ERS sanity check failed ({{ ers_check.status }}). Verify ERS is enabled and credentials."
      when: ers_check.status != 200

    - name: Ensure Location NDGs exist
      cisco.ise.network_device_group:
        <<: *ise_login
        state: present
        name: "Location#All Locations#{{ item }}"
        othername: Location
      loop:
        - Lab
        - HQ
        - Branch

    - name: Ensure Device Type NDGs exist
      cisco.ise.network_device_group:
        <<: *ise_login
        state: present
        name: "Device Type#All Device Types#{{ item }}"
        othername: "Device Type"
      loop:
        - Switch
        - WLC
        - Router
        - Firewall

    - name: Ensure lab internal identity group
      cisco.ise.identitygroup:
        <<: *ise_login
        state: present
        name: Lab_Users
        description: Lab users for dot1x testing
        parent: "NAC Group:NAC:IdentityGroups:User Identity Groups"
