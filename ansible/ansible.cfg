[defaults]
inventory = inventory/hosts.yml
interpreter_python = auto_silent
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
forks = 10
collections_path = ~/.ansible/collections
roles_path = roles

[persistent_connection]
connect_timeout = 60
command_timeout = 60

[ssh_connection]
pipelining = True
